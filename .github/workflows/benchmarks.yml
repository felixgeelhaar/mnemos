name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - "internal/relate/**"
      - "internal/extract/**"
      - "internal/pipeline/**"
      - "benchmarks/**"
      - "cmd/mnemos/**"
      - ".github/workflows/benchmarks.yml"
  pull_request:
    branches: [main]
    paths:
      - "internal/relate/**"
      - "internal/extract/**"
      - "internal/pipeline/**"
      - "benchmarks/**"
      - "cmd/mnemos/**"
      - ".github/workflows/benchmarks.yml"

permissions:
  contents: read

jobs:
  contradiction-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build mnemos linux/amd64 binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o mnemos ./cmd/mnemos

      - name: Build benchmark image
        run: |
          docker build -t ghcr.io/felixgeelhaar/mnemos:bench-ci .

      - name: Boot Mnemos via docker-compose
        env:
          MNEMOS_TAG: bench-ci
          MNEMOS_JWT_SECRET: ci-secret-not-used-outside-bench
          # No LLM provider in CI: rule-based mode only. The
          # benchmark adapter respects MNEMOS_BENCH_LLM=0.
          MNEMOS_LLM_PROVIDER: ""
          MNEMOS_LLM_API_KEY: "ci-no-key"
        run: |
          docker compose -f benchmarks/docker-compose.yml up -d mnemos
          for i in {1..30}; do
            curl -sf http://localhost:7777/health 2>/dev/null | grep -q ok && exit 0
            sleep 2
          done
          echo "mnemos failed to come up" && exit 1

      - name: Install harness deps
        run: |
          pip install -r benchmarks/requirements.txt

      - name: Run contradiction-detection suite (rule-based)
        env:
          MNEMOS_BENCH_LLM: "0"
        run: |
          python -m benchmarks.run \
            --provider mnemos \
            --suite contradiction_detection \
            --output benchmarks/results

      - name: Compare against baseline
        run: |
          python -m benchmarks.check_baseline \
            --baseline benchmarks/baseline.json \
            --results-dir benchmarks/results

      - name: Upload latest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/*.json

      - name: Tear down
        if: always()
        env:
          MNEMOS_TAG: bench-ci
          MNEMOS_JWT_SECRET: ci-secret
          MNEMOS_LLM_API_KEY: ci-no-key
        run: |
          docker compose -f benchmarks/docker-compose.yml down -v || true
