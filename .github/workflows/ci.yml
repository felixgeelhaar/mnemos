# Thin caller for the shared klarlabs-studio Go CI bar. All core gate logic
# (format, golangci-lint w/ gocritic, race + coverage tests, coverctl gate,
# nox security scan w/ pinned+sha256 binary) lives in the reusable workflow —
# bump versions / add jobs there, once, org-wide.
#
# mnemos-specific jobs that the shared bar does NOT cover live in their own
# workflows: db-providers.yml (Postgres + MySQL), recall-gate.yml (Python
# benchmark gate), integration.yml (docker-compose smoke), release.yml
# (multi-arch docker / goreleaser / SLSA).
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
    permissions:
      contents: read
      security-events: write
    secrets: inherit
    with:
      # mnemos enforces coverctl check already; pure-Go core runs fine on ubuntu.
      coverage: true
      cross-platform: false
