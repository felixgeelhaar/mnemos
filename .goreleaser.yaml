version: 2

project_name: mnemos

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mnemos
    main: ./cmd/mnemos
    binary: mnemos
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }} -X main.buildDate={{ .Date }}

archives:
  - id: bundles
    ids:
      - mnemos
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*

brews:
  - ids:
      - mnemos
    repository:
      owner: felixgeelhaar
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/felixgeelhaar/mnemos
    description: "Local-first evidence layer that grounds AI in truth"
    license: MIT
    install: |
      bin.install "mnemos"
    test: |
      system bin/"mnemos", "--version"

dockers:
  - image_templates:
      - "ghcr.io/felixgeelhaar/mnemos:{{ .Version }}"
      - "ghcr.io/felixgeelhaar/mnemos:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .ShortCommit }}"
      - "--build-arg=BUILD_DATE={{ .Date }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: felixgeelhaar
    name: Mnemos
  draft: false
  prerelease: auto

snapshot:
  version_template: "{{ incpatch .Version }}-next"
