# Pre-commit hooks for Mnemos.
#
# Install once per clone:
#   pip install pre-commit  (or: brew install pre-commit)
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#
# Run on demand against all files:
#   pre-commit run --all-files
#
# The hook set is a strict subset of CI: passing pre-commit guarantees
# CI will not reject on style or lint. CI is the source of truth — these
# hooks are local fast-feedback, not a parallel pipeline.

minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-mod-tidy

  - repo: local
    hooks:
      - id: go-vet-mod
        name: go vet ./...
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: gocritic
        name: gocritic
        entry: bash -c 'command -v gocritic >/dev/null 2>&1 || go install github.com/go-critic/go-critic/cmd/gocritic@latest; gocritic check ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: nox-scan
        name: nox scan
        entry: bash -c 'command -v nox >/dev/null 2>&1 && nox scan . || echo "nox not installed; skipping"'
        language: system
        pass_filenames: false

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.6
    hooks:
      - id: golangci-lint
        args: [--timeout=5m]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
