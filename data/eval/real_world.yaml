    not_expected_claims: []

  - id: real-006
    description: "Retrospective with conflicting data"
    tags: [real_world, retrospective, contested]
    input: "Sprint 24 Retrospective. What went well. We shipped 12 features. Team velocity is 42 story points. What didn't go well. We didn't meet the Q4 target. We met the Q4 target. Learnings. User research might have prevented the rework. We decided to add dedicated QA"
    expected_claims:
      - text: "We shipped 12 features"
        type: fact
        min_confidence: 0.80
      - text: "Team velocity is 42 story points"
        type: fact
        min_confidence: 0.80
      - text: "We didn't meet the Q4 target"
        type: fact
        status: contested
        min_confidence: 0.70
      - text: "We met the Q4 target"
        type: fact
        status: contested
        min_confidence: 0.70
      - text: "User research might have prevented the rework"
        type: hypothesis
        min_confidence: 0.50
      - text: "We decided to add dedicated QA"
        type: decision
        min_confidence: 0.80
    expected_min_count: 4
    not_expected_claims: []

