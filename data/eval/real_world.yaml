# Real-World Document Tests

test_cases:
  - id: real-001
    description: "Meeting notes with multiple claim types"
    tags: [real_world, meeting_notes]
    input: "Q3 Planning Meeting scheduled for March 1 2026. Attendees include Product Engineering and Design. Key decisions were made. We will prioritize mobile app over web dashboard. Budget approved for 2 additional engineers. API v2 launch scheduled for April 15. Discussion points covered. Current DAU is 15,000. User retention might improve with push notifications. Conversion rate approximately 3.5 percent. Engineering to complete security audit by March 20"
    expected_claims:
      - text: "We will prioritize mobile app over web dashboard"
        type: decision
        min_confidence: 0.80
      - text: "Budget approved for 2 additional engineers"
        type: decision
        min_confidence: 0.80
      - text: "API v2 launch scheduled for April 15"
        type: fact
        min_confidence: 0.80
      - text: "Current DAU is 15,000"
        type: fact
        min_confidence: 0.80
      - text: "User retention might improve with push notifications"
        type: hypothesis
        min_confidence: 0.50
      - text: "Engineering to complete security audit by March 20"
        type: fact
        min_confidence: 0.75
    expected_min_count: 4
    not_expected_claims: []

  - id: real-002
    description: "Technical PRD excerpt"
    tags: [real_world, prd]
    input: "Feature: User Authentication. Users must authenticate via OAuth. JWT tokens expire after 24 hours. Refresh tokens are valid for 30 days. Architecture decisions made. We will use Auth0 as the identity provider. Sessions stored in Redis with 24h TTL. Passwords must be at least 12 characters. MFA might be required for admin accounts"
    expected_claims:
      - text: "Users must authenticate via OAuth"
        type: fact
        min_confidence: 0.75
      - text: "JWT tokens expire after 24 hours"
        type: fact
        min_confidence: 0.80
      - text: "Refresh tokens are valid for 30 days"
        type: fact
        min_confidence: 0.80
      - text: "We will use Auth0 as the identity provider"
        type: decision
        min_confidence: 0.80
      - text: "Sessions stored in Redis"
        type: fact
        min_confidence: 0.75
      - text: "Passwords must be at least 12 characters"
        type: fact
        min_confidence: 0.75
      - text: "MFA might be required for admin accounts"
        type: hypothesis
        min_confidence: 0.50
    expected_min_count: 5
    not_expected_claims: []

  - id: real-003
    description: "Bug report with facts and hypotheses"
    tags: [real_world, bug_report]
    input: "Bug: Slow API Responses. Severity: High. Average response time is 2 seconds. Database queries are the bottleneck. We observed N+1 query pattern in user service. Adding indexes might reduce latency. We decided to implement connection pooling. Fix will be deployed by end of week"
    expected_claims:
      - text: "Average response time is 2"
        type: fact
        min_confidence: 0.70
      - text: "Database queries are the bottleneck"
        type: fact
        min_confidence: 0.75
      - text: "We observed N+1 query pattern in user service"
        type: fact
        min_confidence: 0.75
      - text: "Adding indexes might reduce latency"
        type: hypothesis
        min_confidence: 0.50
      - text: "We decided to implement connection pooling"
        type: decision
        min_confidence: 0.80
      - text: "Fix will be deployed by end of week"
        type: fact
        min_confidence: 0.75
    expected_min_count: 4
    not_expected_claims: []

