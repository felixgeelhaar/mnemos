    tags: [real_world, okr]
    input: "Q2 OKRs. Objective 1: Improve Platform Reliability. Achieve 99 percent uptime. Currently at 99 percent. Reduce P1 incidents to less than 2 per month. Response time should be under 200ms at P95. Objective 2: Grow User Base. DAU might reach 25,000 by end of quarter. We will launch referral program. Conversion rate target is 5 percent"
    expected_claims:
      - text: "Achieve 99 percent uptime"
        type: fact
        min_confidence: 0.70
      - text: "Reduce P1 incidents to less than 2 per month"
        type: fact
        min_confidence: 0.75
      - text: "Response time should be under 200ms"
        type: fact
        min_confidence: 0.75
      - text: "DAU might reach 25,000 by end of quarter"
        type: hypothesis
        min_confidence: 0.50
      - text: "We will launch referral program"
        type: decision
        min_confidence: 0.80
      - text: "Conversion rate target is 5 percent"
        type: fact
        min_confidence: 0.75
    expected_min_count: 4
    not_expected_claims: []

  - id: real-005
    description: "Architecture decision record"
    tags: [real_world, adr]
    input: "ADR-001: Choose Message Queue. Status: Accepted. System handles 100K messages per day. We need at-least-once delivery guarantees. We will use Apache Kafka for message streaming. Redis Streams chosen for caching layer. Team needs Kafka training. Operational complexity will increase"
    expected_claims:
      - text: "System handles 100K messages per day"
        type: fact
        min_confidence: 0.80
      - text: "We need at-least-once delivery guarantees"
        type: fact
        min_confidence: 0.75
      - text: "We will use Apache Kafka for message streaming"
        type: decision
        min_confidence: 0.80
      - text: "Redis Streams chosen for caching layer"
        type: decision
        min_confidence: 0.80
      - text: "Team needs Kafka training"
        type: fact
        min_confidence: 0.75
      - text: "Operational complexity will increase"
