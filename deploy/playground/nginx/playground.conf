# Rate-limit zone: 30 req/min per IP, 5 burst (~1 req/2s with bursts).
limit_req_zone $binary_remote_addr zone=playground:10m rate=30r/m;

# Token endpoint zone: stricter — 5 req/min, no burst. Discourages
# scripts that hammer for tokens.
limit_req_zone $binary_remote_addr zone=tokens:10m rate=5r/m;

server {
    listen 8080;
    server_name _;
    server_tokens off;

    # Surface the shared playground token. Anyone can read it; that's
    # the design. The token is rate-limited at the Mnemos layer and
    # rotated on restart.
    location = /token {
        limit_req zone=tokens burst=2 nodelay;
        default_type text/plain;
        alias /var/www/token/playground.jwt;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Health passes straight through, no rate limit.
    location = /health {
        proxy_pass http://mnemos:7777/health;
    }

    # All other Mnemos API routes — rate-limited.
    location / {
        limit_req zone=playground burst=5 nodelay;
        proxy_pass http://mnemos:7777;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Browser CORS for try-it-from-a-page demos.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
